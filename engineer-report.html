<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#080d14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Engineer Field Report</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080d14;--card:#0d1a2a;--border:#1e3a5f;
  --text:#c8d8f0;--muted:#3b6090;--bright:#e0eeff;
  --blue:#1d4ed8;--indigo:#4f46e5;--green:#16a34a;
  --red:#dc2626;--orange:#ea580c;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,sans-serif;min-height:100vh}
input,textarea,select{width:100%;padding:11px 14px;border-radius:10px;font-size:14px;background:#050a12;border:1.5px solid var(--border);color:var(--bright);font-family:inherit;transition:border-color .2s,box-shadow .2s;outline:none}
input:focus,textarea:focus,select:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.18)}
textarea{resize:vertical}
button{cursor:pointer;font-family:inherit;transition:opacity .2s,transform .1s}
button:active{transform:scale(.97)}
.hidden{display:none!important}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Header */
header{background:rgba(10,18,30,.97);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.hdr{max-width:900px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--indigo));display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-title{font-weight:800;font-size:15px;color:var(--bright)}
.logo-sub{font-size:11px;color:var(--muted)}
.btn-logout{background:#0d1e30;border:1px solid var(--border);border-radius:8px;color:#60a5fa;padding:6px 12px;font-size:12px;font-weight:600}

/* Tabs */
.tabs{display:flex;gap:4px;background:rgba(10,18,30,.8);padding:5px;border-radius:12px;border:1px solid var(--border);width:fit-content;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{padding:8px 14px;border-radius:9px;border:none;font-size:13px;font-weight:600;background:transparent;color:#4b7090}
.tab-btn.active{background:linear-gradient(135deg,var(--blue),var(--indigo));color:#fff}

/* Card */
.card{background:rgba(13,26,42,.8);border:1px solid var(--border);border-radius:16px;padding:22px 18px}
.wrap{max-width:900px;margin:0 auto;padding:18px 14px}

/* Form */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:13px;font-weight:600;color:#4b7090}
.err-msg{font-size:12px;color:#f87171}
.btn-primary{width:100%;padding:13px;margin-top:16px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--blue),var(--indigo));color:#fff;font-size:15px;font-weight:800;box-shadow:0 4px 24px rgba(29,78,216,.4);letter-spacing:.3px}
.btn-primary:disabled{background:#1e3a5f;cursor:wait}
.btn-sm{padding:6px 14px;border-radius:8px;border:none;font-size:12px;font-weight:600}
.btn-green{background:#052e16;border:1px solid var(--green);color:#4ade80}
.btn-red{background:#450a0a;border:1px solid var(--red);color:#f87171}
.btn-blue{background:rgba(59,130,246,.15);border:1px solid #3b82f6;color:#60a5fa}

/* Toast */
.toast{border-radius:12px;padding:13px 18px;margin-bottom:16px;font-weight:700;font-size:14px;animation:slideDown .3s ease}
.toast.ok{background:#052e16;border:1px solid var(--green);color:#4ade80}
.toast.fail{background:#450a0a;border:1px solid var(--red);color:#f87171}

/* Report Card */
.rcard{background:rgba(10,18,30,.8);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;animation:fadeIn .3s}
.rtop{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.rname{font-size:16px;font-weight:800;color:var(--bright)}
.rmeta{font-size:12px;color:var(--muted);margin-top:3px}
.badge{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.rblock{background:#050a12;border:1px solid #0f2040;border-radius:10px;padding:12px}
.rbtitle{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:5px}
.rbtext{font-size:13px;color:#8ab0d0;line-height:1.5}
.rremarks{margin-top:10px;padding:10px 12px;background:#050a12;border-radius:8px;font-size:13px;color:#5b7a9a}
.rtime{margin-top:8px;font-size:11px;color:#1e3a5f}

/* Login */
#login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.lbg{position:absolute;inset:0;background-image:linear-gradient(rgba(30,80,180,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(30,80,180,.07) 1px,transparent 1px);background-size:40px 40px}
.lglow{position:absolute;top:20%;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,.1) 0%,transparent 70%);border-radius:50%;filter:blur(40px);pointer-events:none}
.lbox{position:relative;width:100%;max-width:400px}
.llogo{text-align:center;margin-bottom:26px}
.licon{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--blue),var(--indigo));display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;box-shadow:0 0 40px rgba(59,130,246,.35)}
.ltitle{color:#f0f6ff;font-size:24px;font-weight:800}
.lsub{color:var(--muted);font-size:13px;margin-top:5px}
.lcard{background:rgba(15,25,40,.92);border:1px solid rgba(59,130,246,.2);border-radius:20px;padding:26px 22px;backdrop-filter:blur(20px)}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:16px;padding:4px}
.lerr{background:#450a0a;border:1px solid #7f1d1d;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#fca5a5}
.demo-box{margin-top:16px;padding:14px;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15);border-radius:12px}
.demo-title{color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.demo-btn{display:block;width:100%;text-align:left;background:transparent;border:none;color:#60a5fa;font-size:12px;padding:3px 0;font-family:monospace}

/* Admin */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.scard{background:rgba(10,18,30,.8);border-radius:14px;padding:16px}
.sicon{font-size:20px;margin-bottom:6px}
.sval{font-size:26px;font-weight:800}
.slabel{font-size:11px;color:var(--muted);margin-top:2px}
.fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;justify-content:space-between}
.fbtn{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid var(--border);background:transparent;color:#4b7090}
.fbtn.active{border-color:#3b82f6;background:rgba(59,130,246,.15);color:#60a5fa}

/* Users table */
.utbl{width:100%;border-collapse:collapse;font-size:13px}
.utbl th{background:#0d1a2a;color:#4b7090;font-weight:700;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
.utbl td{padding:10px 12px;border-bottom:1px solid #0f2040;color:var(--text);vertical-align:middle}
.utbl tr:hover td{background:rgba(59,130,246,.04)}
.role-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.role-admin{background:#172554;color:#60a5fa}
.role-eng{background:#052e16;color:#4ade80}

/* Empty / Loader */
.empty{text-align:center;padding:48px 20px;color:#2a4060}
.empty-icon{font-size:48px;margin-bottom:10px}
.empty-text{font-size:14px;color:var(--muted)}
.loader{text-align:center;padding:40px;color:var(--muted);font-size:14px}

/* Install banner */
#inst-banner{display:none;background:linear-gradient(135deg,#1e3a5f,#172554);border:1px solid #3b82f6;border-radius:12px;padding:12px 16px;margin-bottom:16px;flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
#inst-banner.show{display:flex}

@media(max-width:600px){
  .g2,.rgrid{grid-template-columns:1fr}
  .sgrid{grid-template-columns:repeat(2,1fr)}
  .wrap{padding:12px 10px}
  .card{padding:16px 12px}
  .tabs{gap:2px}
  .tab-btn{padding:7px 10px;font-size:12px}
  .utbl{display:block;overflow-x:auto}
}
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="login-wrap">
  <div class="lbg"></div>
  <div class="lglow"></div>
  <div class="lbox">
    <div class="llogo">
      <div class="licon">🔧</div>
      <div class="ltitle">Field Report</div>
      <div class="lsub">Engineer Daily Reporting System</div>
    </div>
    <div class="lcard">
      <h2 style="color:var(--bright);font-size:17px;font-weight:700;margin-bottom:18px">Login Karen</h2>

      <div class="field">
        <label>👤 Username</label>
        <input id="u" placeholder="username" autocomplete="username"/>
      </div>
      <div class="field">
        <label>🔑 Password</label>
        <div class="pw-wrap">
          <input type="password" id="p" placeholder="password" autocomplete="current-password" style="padding-right:44px"/>
          <button class="pw-toggle" onclick="tglPw()">👁️</button>
        </div>
      </div>

      <div id="lerr" class="lerr hidden"></div>

      <button class="btn-primary" id="lbtn" onclick="doLogin()">🚀 Login Karen</button>

      <div class="demo-box">
        <div class="demo-title">Demo Accounts (Sheets se aate hain)</div>
        <button class="demo-btn" onclick="fill('ahmed.engineer','ahmed123')">[Engineer] ahmed.engineer / ahmed123</button>
        <button class="demo-btn" onclick="fill('admin','admin123')">[Admin] admin / admin123</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app" class="hidden">
  <header>
    <div class="hdr">
      <div class="logo">
        <div class="logo-icon" id="hicon">🔧</div>
        <div>
          <div class="logo-title">Field Report</div>
          <div class="logo-sub" id="hsub"></div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="text-align:right">
          <div style="font-size:13px;font-weight:700;color:#90badf" id="hname"></div>
          <div style="font-size:11px;color:var(--muted)" id="hdesig"></div>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>
  </header>

  <div class="wrap">
    <!-- Install Banner -->
    <div id="inst-banner">
      <div>
        <div style="font-size:13px;color:#93c5fd;font-weight:600">📱 Phone mein Install Karen</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Home screen par add karo</div>
      </div>
      <button style="background:linear-gradient(135deg,var(--blue),var(--indigo));border:none;border-radius:8px;color:#fff;padding:8px 16px;font-size:13px;font-weight:700" onclick="installPWA()">Install</button>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden"></div>

    <!-- ── Engineer ── -->
    <div id="veng">
      <div class="tabs">
        <button class="tab-btn active" id="t-form"    onclick="eTab('form')">📝 Naya Report</button>
        <button class="tab-btn"        id="t-history" onclick="eTab('history')">📋 Meri Reports</button>
      </div>

      <!-- Form -->
      <div id="p-form" class="card">
        <h2 style="font-size:18px;font-weight:800;color:var(--bright);margin-bottom:4px">Aaj ki Report</h2>
        <p id="fsub" style="font-size:13px;color:var(--muted);margin-bottom:18px"></p>

        <div class="g2">
          <div class="field"><label>📅 Tarikh</label><input type="date" id="fd"/></div>
          <div class="field">
            <label>⏱️ Ghante *</label>
            <input type="number" id="fh" min="1" max="24" placeholder="Jaise: 8"/>
            <span class="err-msg hidden" id="eh">Sahi ghante bharen</span>
          </div>
        </div>
        <div class="field"><label>🚦 Status</label>
          <select id="fs"><option>On Track</option><option>Delayed</option><option>Blocked</option><option>Completed</option></select>
        </div>
        <div class="field">
          <label>✅ Aaj Kya Kiya *</label>
          <textarea id="ft" rows="3" placeholder="Aaj kiye gaye kaam ki poori detail..."></textarea>
          <span class="err-msg hidden" id="et">Kaam ki details zaroor bharen</span>
        </div>
        <div class="g2">
          <div class="field"><label>⚠️ Issues</label><textarea id="fi" rows="3" placeholder="Koi dikkat?"></textarea></div>
          <div class="field"><label>📅 Kal ka Plan</label><textarea id="fp" rows="3" placeholder="Kal kya karna hai..."></textarea></div>
        </div>
        <div class="field"><label>💬 Remarks</label><input id="fr" placeholder="Koi aur baat..."/></div>
        <button class="btn-primary" id="sbtn" onclick="submitReport()">📤 Report Submit Karen</button>
      </div>

      <!-- History -->
      <div id="p-history" class="hidden"><div id="hlist"></div></div>
    </div>

    <!-- ── Admin ── -->
    <div id="vadm" class="hidden">
      <div class="tabs">
        <button class="tab-btn active" id="t-reports" onclick="aTab('reports')">📋 Saari Reports</button>
        <button class="tab-btn"        id="t-users"   onclick="aTab('users')">👥 Users Manage</button>
      </div>

      <!-- Reports -->
      <div id="p-reports">
        <div class="sgrid" id="astats"></div>
        <div class="fbar">
          <div id="fbtns" style="display:flex;gap:8px;flex-wrap:wrap"></div>
          <button class="fbtn active" onclick="loadAdminReports()">🔄 Refresh</button>
        </div>
        <div id="alist"></div>
      </div>

      <!-- Users -->
      <div id="p-users" class="hidden">
        <!-- Add user form -->
        <div class="card" style="margin-bottom:16px">
          <h3 style="font-size:15px;font-weight:700;color:var(--bright);margin-bottom:14px">➕ Naya User Add Karen</h3>
          <div class="g2">
            <div class="field"><label>👤 Username *</label><input id="nu" placeholder="username.engineer"/></div>
            <div class="field"><label>🔑 Password *</label><input id="np" placeholder="password"/></div>
          </div>
          <div class="g2">
            <div class="field"><label>📛 Naam *</label><input id="nn" placeholder="Poora naam"/></div>
            <div class="field"><label>🎭 Role</label>
              <select id="nr"><option value="engineer">Engineer</option><option value="admin">Admin</option></select>
            </div>
          </div>
          <div class="g2">
            <div class="field"><label>💼 Designation</label><input id="nd" placeholder="Jaise: Site Engineer"/></div>
            <div class="field"><label>📍 Site</label><input id="ns" placeholder="Project naam"/></div>
          </div>
          <div id="uerr" class="lerr hidden"></div>
          <button class="btn-primary" id="addbtn" onclick="addUser()" style="margin-top:10px">➕ User Add Karen</button>
        </div>

        <!-- Users list -->
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
            <h3 style="font-size:15px;font-weight:700;color:var(--bright)">👥 Existing Users</h3>
            <button class="btn-sm btn-blue" onclick="loadUsers()">🔄 Refresh</button>
          </div>
          <div id="ulist"><div class="loader">Loading...</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// ⚠️  APNA GOOGLE APPS SCRIPT URL YAHAN PASTE KAREN
// ════════════════════════════════════════════════════
const SCRIPT_URL = "YOUR_APPS_SCRIPT_URL_HERE";
// ════════════════════════════════════════════════════

const SS = {
  "On Track":  {bg:"#052e16",br:"#16a34a",tx:"#4ade80",d:"#22c55e"},
  "Delayed":   {bg:"#450a0a",br:"#dc2626",tx:"#f87171",d:"#ef4444"},
  "Blocked":   {bg:"#431407",br:"#ea580c",tx:"#fb923c",d:"#f97316"},
  "Completed": {bg:"#172554",br:"#2563eb",tx:"#60a5fa",d:"#3b82f6"},
};

let CU = null, deferredInstall = null, allAdminReports = [];

// PWA
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredInstall = e;
  document.getElementById('inst-banner').classList.add('show');
});
function installPWA() {
  if (deferredInstall) { deferredInstall.prompt(); deferredInstall = null; document.getElementById('inst-banner').classList.remove('show'); }
}

function today() { return new Date().toISOString().split('T')[0]; }

// ── API ──────────────────────────────────────────────
async function api(payload) {
  if (SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE") return localFallback(payload);
  try {
    const r = await fetch(SCRIPT_URL, { method:"POST", body: JSON.stringify(payload) });
    return await r.json();
  } catch(e) { return { success:false, error:"Network error. Internet check karen." }; }
}

// Local fallback (jab URL set na ho)
const LK = "er_v2";
function getLR() { try { return JSON.parse(localStorage.getItem(LK)||"[]"); } catch{return[]} }
const LOCAL_USERS = [
  {id:1,username:"ahmed.engineer",password:"ahmed123",name:"Ahmed Khan",role:"engineer",designation:"Site Engineer",site:"Project Alpha"},
  {id:2,username:"sara.engineer", password:"sara123", name:"Sara Malik", role:"engineer",designation:"Jr. Engineer",  site:"Project Beta"},
  {id:3,username:"admin",         password:"admin123",name:"Manager Sahab",role:"admin",designation:"Project Manager",site:"All Sites"},
];
function localFallback(p) {
  if (p.action==="login") {
    const u = LOCAL_USERS.find(x=>x.username===p.username&&x.password===p.password);
    return u ? {success:true,user:u} : {success:false,error:"Galat username ya password"};
  }
  if (p.action==="submitReport") {
    const recs = getLR();
    recs.unshift({...p,id:Date.now(),submittedAt:new Date().toLocaleString("en-IN")});
    localStorage.setItem(LK, JSON.stringify(recs));
    return {success:true,local:true};
  }
  if (p.action==="getMyReports") return {success:true,reports:getLR().filter(r=>r.engineerName===p.engineerName)};
  if (p.action==="getReports")   return {success:true,reports:getLR()};
  if (p.action==="getUsers")     return {success:true,users:LOCAL_USERS.map(u=>({...u,naam:u.name}))};
  if (p.action==="addUser")      return {success:false,error:"Local mode mein user add nahi hoga. Sheets URL set karen."};
  if (p.action==="deleteUser")   return {success:false,error:"Local mode mein delete nahi hoga. Sheets URL set karen."};
  return {success:false,error:"Unknown"};
}

// ── Toast ────────────────────────────────────────────
function toast(msg, type="ok") {
  const t = document.getElementById('toast');
  t.className = `toast ${type}`;
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.add('hidden'), 3500);
}

// ── Login ────────────────────────────────────────────
function tglPw() { const i=document.getElementById('p'); i.type=i.type==="password"?"text":"password"; }
function fill(u,pw) { document.getElementById('u').value=u; document.getElementById('p').value=pw; document.getElementById('lerr').classList.add('hidden'); }

async function doLogin() {
  const username=document.getElementById('u').value.trim();
  const password=document.getElementById('p').value;
  const errEl=document.getElementById('lerr');
  const btn=document.getElementById('lbtn');

  errEl.classList.add('hidden');
  if (!username||!password) { errEl.textContent="Username aur password bharen"; errEl.classList.remove('hidden'); return; }

  btn.disabled=true; btn.textContent="⏳ Verify ho raha hai...";
  const res = await api({action:"login", username, password});
  btn.disabled=false; btn.textContent="🚀 Login Karen";

  if (res.success) {
    CU = res.user;
    document.getElementById('login-wrap').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    initApp();
  } else {
    errEl.textContent = res.error || "Login fail hua";
    errEl.classList.remove('hidden');
  }
}
document.addEventListener('keydown', e => {
  if (e.key==="Enter" && !document.getElementById('login-wrap').classList.contains('hidden')) doLogin();
});

// ── Init ─────────────────────────────────────────────
function initApp() {
  document.getElementById('hname').textContent  = CU.name;
  document.getElementById('hdesig').textContent = CU.designation;
  document.getElementById('hsub').textContent   = CU.site;

  if (SCRIPT_URL==="YOUR_APPS_SCRIPT_URL_HERE") toast("⚠️ Local mode — Sheets URL set nahi hai","fail");

  if (CU.role==="admin") {
    document.getElementById('hicon').textContent="📊";
    document.getElementById('veng').classList.add('hidden');
    document.getElementById('vadm').classList.remove('hidden');
    loadAdminReports();
  } else {
    document.getElementById('veng').classList.remove('hidden');
    document.getElementById('vadm').classList.add('hidden');
    document.getElementById('fd').value=today();
    document.getElementById('fsub').textContent=`📍 ${CU.site}  ·  👷 ${CU.name}`;
  }
}

function logout() {
  CU=null;
  document.getElementById('login-wrap').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('u').value=''; document.getElementById('p').value='';
  document.getElementById('lerr').classList.add('hidden');
}

// ── Engineer Tabs ─────────────────────────────────────
function eTab(t) {
  ['form','history'].forEach(x => {
    document.getElementById('t-'+x).classList.toggle('active',x===t);
    document.getElementById('p-'+x).classList.toggle('hidden',x!==t);
  });
  if (t==='history') loadMyReports();
}

// ── Submit Report ─────────────────────────────────────
async function submitReport() {
  const tasks=document.getElementById('ft').value.trim();
  const hours=document.getElementById('fh').value;
  document.getElementById('et').classList.toggle('hidden',!!tasks);
  document.getElementById('eh').classList.toggle('hidden',!!hours&&!isNaN(hours));
  if (!tasks||!hours||isNaN(hours)) return;

  const btn=document.getElementById('sbtn');
  btn.disabled=true; btn.textContent="⏳ Google Sheets mein save ho raha hai...";

  const res = await api({
    action:"submitReport",
    engineerName:CU.name, designation:CU.designation, site:CU.site,
    date:document.getElementById('fd').value||today(),
    hoursWorked:hours, status:document.getElementById('fs').value,
    tasksCompleted:tasks,
    issuesFaced:document.getElementById('fi').value,
    nextDayPlan:document.getElementById('fp').value,
    remarks:document.getElementById('fr').value,
  });

  btn.disabled=false; btn.textContent="📤 Report Submit Karen";

  if (res.success) {
    toast(res.local ? "📱 Phone mein save hua (local mode)" : "✅ Google Sheets mein save ho gayi!");
    ['ft','fi','fp','fr'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('fh').value='';
    document.getElementById('fd').value=today();
    document.getElementById('fs').value='On Track';
    setTimeout(()=>eTab('history'),1600);
  } else {
    toast("❌ "+( res.error||"Submit fail hua"),"fail");
  }
}

// ── My Reports ────────────────────────────────────────
async function loadMyReports() {
  const el=document.getElementById('hlist');
  el.innerHTML='<div class="loader">⏳ Loading...</div>';
  const res = await api({action:"getMyReports", engineerName:CU.name});
  renderReports(el, res.success ? res.reports : [], false);
}

// ── Admin Tabs ────────────────────────────────────────
function aTab(t) {
  ['reports','users'].forEach(x => {
    document.getElementById('t-'+x).classList.toggle('active',x===t);
    document.getElementById('p-'+x).classList.toggle('hidden',x!==t);
  });
  if (t==='users') loadUsers();
}

// ── Admin Reports ─────────────────────────────────────
async function loadAdminReports() {
  const el=document.getElementById('alist');
  el.innerHTML='<div class="loader">⏳ Reports load ho rahi hain...</div>';
  const res = await api({action:"getReports"});
  if (!res.success) { el.innerHTML=`<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">${res.error}</div></div>`; return; }

  allAdminReports = res.reports || [];
  const todayS = today();
  document.getElementById('astats').innerHTML = [
    {l:"Kul Reports", v:allAdminReports.length,                                      i:"📋", c:"#3b82f6"},
    {l:"Aaj ki",      v:allAdminReports.filter(r=>r.date===todayS).length,           i:"📅", c:"#10b981"},
    {l:"Blocked",     v:allAdminReports.filter(r=>r.status==="Blocked").length,      i:"🚫", c:"#f97316"},
    {l:"Completed",   v:allAdminReports.filter(r=>r.status==="Completed").length,    i:"✅", c:"#6366f1"},
  ].map(s=>`<div class="scard" style="border:1px solid ${s.c}30"><div class="sicon">${s.i}</div><div class="sval" style="color:${s.c}">${s.v}</div><div class="slabel">${s.l}</div></div>`).join('');

  const sites = ["All",...new Set(allAdminReports.map(r=>r.site).filter(Boolean))];
  document.getElementById('fbtns').innerHTML = sites.map(s=>
    `<button class="fbtn${s==="All"?" active":""}" onclick="filterBy('${s}',this)">${s}</button>`
  ).join('');

  renderReports(el, allAdminReports, true);
}

function filterBy(site, btn) {
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = site==="All" ? allAdminReports : allAdminReports.filter(r=>r.site===site);
  renderReports(document.getElementById('alist'), filtered, true);
}

// ── Users ─────────────────────────────────────────────
async function loadUsers() {
  const el=document.getElementById('ulist');
  el.innerHTML='<div class="loader">⏳ Loading...</div>';
  const res = await api({action:"getUsers"});
  if (!res.success || !res.users.length) { el.innerHTML='<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">Koi user nahi mila</div></div>'; return; }

  el.innerHTML = `<div style="overflow-x:auto"><table class="utbl">
    <thead><tr><th>Naam</th><th>Username</th><th>Password</th><th>Role</th><th>Designation</th><th>Site</th><th>Action</th></tr></thead>
    <tbody>
    ${res.users.map(u=>`
      <tr>
        <td style="font-weight:700;color:var(--bright)">${u.naam||u.name||''}</td>
        <td style="font-family:monospace;color:#60a5fa">${u.username}</td>
        <td style="font-family:monospace;color:#94a3b8">${u.password}</td>
        <td><span class="role-badge ${u.role==='admin'?'role-admin':'role-eng'}">${u.role}</span></td>
        <td>${u.designation||'—'}</td>
        <td>${u.site||'—'}</td>
        <td><button class="btn-sm btn-red" onclick="delUser('${u.username}')">🗑️ Delete</button></td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

async function addUser() {
  const u=document.getElementById('nu').value.trim();
  const p=document.getElementById('np').value.trim();
  const n=document.getElementById('nn').value.trim();
  const errEl=document.getElementById('uerr');
  errEl.classList.add('hidden');

  if (!u||!p||!n) { errEl.textContent="Username, password aur naam zaroor bharen"; errEl.classList.remove('hidden'); return; }

  const btn=document.getElementById('addbtn');
  btn.disabled=true; btn.textContent="⏳ Adding...";
  const res = await api({action:"addUser", username:u, password:p, naam:n,
    role:document.getElementById('nr').value,
    designation:document.getElementById('nd').value,
    site:document.getElementById('ns').value});
  btn.disabled=false; btn.textContent="➕ User Add Karen";

  if (res.success) {
    toast("✅ Naya user add ho gaya!");
    ['nu','np','nn','nd','ns'].forEach(id=>document.getElementById(id).value='');
    loadUsers();
  } else {
    errEl.textContent = res.error||"User add nahi hua";
    errEl.classList.remove('hidden');
  }
}

async function delUser(username) {
  if (!confirm(`"${username}" ko delete karna chahte ho?`)) return;
  const res = await api({action:"deleteUser", username});
  if (res.success) { toast("🗑️ User delete ho gaya!"); loadUsers(); }
  else toast("❌ "+res.error,"fail");
}

// ── Render Reports ────────────────────────────────────
function renderReports(el, reports, showEng) {
  if (!reports.length) { el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Koi report nahi mili</div></div>'; return; }
  el.innerHTML = reports.map(r => {
    const sc = SS[r.status]||SS["On Track"];
    return `<div class="rcard">
      <div class="rtop">
        <div>
          ${showEng?`<div class="rname">👷 ${r.engineerName||''}</div>`:''}
          <div class="rmeta">${r.designation||''} · 📍 ${r.site||''} · 📅 ${r.date||''} · ⏱️ ${r.hoursWorked||''} ghante</div>
        </div>
        <span class="badge" style="background:${sc.bg};border:1px solid ${sc.br};color:${sc.tx}">
          <span class="dot" style="background:${sc.d}"></span>${r.status}
        </span>
      </div>
      <div class="rgrid">
        <div class="rblock"><div class="rbtitle">✅ Kaam Kiya</div><div class="rbtext">${r.tasksCompleted||'—'}</div></div>
        <div class="rblock"><div class="rbtitle">⚠️ Issues</div><div class="rbtext">${r.issuesFaced||'—'}</div></div>
        <div class="rblock"><div class="rbtitle">📅 Kal ka Plan</div><div class="rbtext">${r.nextDayPlan||'—'}</div></div>
      </div>
      ${r.remarks?`<div class="rremarks">💬 ${r.remarks}</div>`:''}
      <div class="rtime">🕐 ${r.submittedAt||''}</div>
    </div>`;
  }).join('');
}
</script>
</body>
